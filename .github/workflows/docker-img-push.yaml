name: Build and Push Docker Image
permissions:
  contents: read
  packages: write
on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile:
          - Dockerfile
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
      - name: Log in to GitHub Docker registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Assign environment variables used in subsequent steps
      - name: Env IMG_REPO_NAME Assignment
        env:
          DOCKERFILE_NAME: ${{ matrix.dockerfile }}
          IMG_REPO_NAME: ${{ github.repository }}
        run: echo "IMG_REPO_NAME=${IMG_REPO_NAME}" >> "${GITHUB_ENV}"
      # TAG_NAME defaults to 'latest' if not a release or manual deployment
      - name: Assign TAG_NAME
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          echo "TAG_NAME=latest" >> "${GITHUB_ENV}"
          if [ "$RELEASE_TAG" != "" ]; then
            echo "TAG_NAME=$RELEASE_TAG" >> "${GITHUB_ENV}"
          fi;
          if [ "$INPUT_VERSION" != "" ]; then
            echo "TAG_NAME=$INPUT_VERSION" >> "${GITHUB_ENV}"
          fi;
      - name: Set variable based on actor
        env:
          ACTOR: ${{ github.actor }}
        run: |
          if [[ "$ACTOR" == *"bot"* ]]; then
            echo "GITHUB_ACTOR=bot" >> $GITHUB_ENV
          else
            echo "GITHUB_ACTOR=$ACTOR" >> $GITHUB_ENV
          fi
      - name: Build Docker image only
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ghcr.io/${{ env.GITHUB_ACTOR }}/${{ env.IMG_REPO_NAME }}:${{ env.TAG_NAME }}
      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          load: true
          tags: ghcr.io/${{ env.GITHUB_ACTOR }}/${{ env.IMG_REPO_NAME }}:${{ env.TAG_NAME }}
